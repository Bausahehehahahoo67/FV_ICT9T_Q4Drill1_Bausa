<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
</head>
<body>
      <h1>Power Usage</h1>
      <div id="form-box">
        <input type="text" class="form-control" id="kWh" placeholder="Enter your electricity usage in kWh.">
        <button class="btn btn-info" onclick="checkElectricityUsage()">Check Electricity Usage</button>
      </div>

      <script>
        function checkElectricityUsage() {
            var kWh = document.getElementById("kWh").value
            let cat1 = "Lifeline Consumer";
            if (isNaN(kWh) || (kWh < 0)) {
                alert("Please enter something we can actually comprehend >:(")
            }
            else if(kWh <= 100) {
                alert("You are a Lifeline Consumer!")
            }
            else if(kWh <=200) {
                alert("You are a Normal Residential Consumer!")
            }
            else if(kWh <= 300) {
                alert("You are a Typical Consumer!")
            }
            else if(kWh <= 500) {
                alert("You are a Higher electricity Consumer!")
            }
            else if(kWh > 500) {
                alert("You are a Heavy electricity Consumer!")
            }
            else{
                alert("The data you have entered is currently invalid.")
            }
            

        }
      </script>
</body>
</html>
