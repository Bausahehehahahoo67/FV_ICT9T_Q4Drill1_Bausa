      <script>
        function checkAge() {
            var kWh = document.getElementById("number of years").value
            let cat1 = "Lifeline Consumer";
            if (isNaN(kWh) || (kWh < 0)) {
                alert("Please enter something we can actually comprehend >:(")
            }
            else if(kWh <= 100) {
                alert("You are a Lifeline Consumer!")
            }
            else if(kWh <=200) {

            }
